<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Smart Event Management</title>
  <link rel="stylesheet" href="css/style2.css">
</head>
<body>

  <div class="glass-card">
    <h2>Create Account</h2>

    <form id="registration-form">

      <input type="text" id="name" placeholder="Full Name" required class="input-field">
      <input type="email" id="email" placeholder="Email" required class="input-field">
      <input type="password" id="password" placeholder="Password" required class="input-field">

      <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <p class="small-text">
      Already have an account?
      <a href="login.html" style="color: white; font-weight: bold;">Login</a>
    </p>
  </div>

  <script>
    document.getElementById('registration-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const userData = {
        username: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch('http://127.0.0.1:5000/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData)
        });

        const result = await response.json();

        if (result.success) {
          alert("Registration Successful!");
          window.location.href = "login.html";
        } else {
          alert(result.message || "Registration failed");
        }

      } catch (error) {
        console.error(error);
        alert("Cannot connect to server. Please make sure backend is running.");
      }
    });
  </script>

</body>
</html>
